<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantity Measurement App | Register</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page" data-page="register">
    <div class="bg-shape bg-shape-one"></div>
    <div class="bg-shape bg-shape-two"></div>

    <main class="auth-wrapper">
      <section class="auth-card" aria-labelledby="register-title">
        <div class="brand-block">
          <h1 id="register-title">Create Account</h1>
          <p>Register to start converting quantities instantly.</p>
        </div>

        <form id="registerForm" class="form" novalidate>
          <div class="form-group">
            <label for="registerEmail">Email</label>
            <input
              id="registerEmail"
              name="email"
              type="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="form-group">
            <label for="registerPassword">Password</label>
            <input
              id="registerPassword"
              name="password"
              type="password"
              placeholder="Create a secure password"
              autocomplete="new-password"
              required
              minlength="6"
            />
          </div>

          <button type="submit" class="btn btn-primary">Register</button>
          <p id="registerMessage" class="form-message" role="status" aria-live="polite"></p>
        </form>

        <p class="auth-switch">
          Already have an account?
          <a href="index.html">Login here</a>
        </p>
      </section>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
