<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantity Measurement App | Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page" data-page="login">
    <div class="bg-shape bg-shape-one"></div>
    <div class="bg-shape bg-shape-two"></div>

    <main class="auth-wrapper">
      <section class="auth-card" aria-labelledby="login-title">
        <div class="brand-block">
          <h1 id="login-title">Quantity Measurement</h1>
          <p>Welcome back. Sign in to continue to your dashboard.</p>
        </div>

        <form id="loginForm" class="form" novalidate>
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input
              id="loginEmail"
              name="email"
              type="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input
              id="loginPassword"
              name="password"
              type="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
              minlength="6"
            />
          </div>

          <button type="submit" class="btn btn-primary">Login</button>
          <p id="loginMessage" class="form-message" role="status" aria-live="polite"></p>
        </form>

        <p class="auth-switch">
          Don't have an account?
          <a href="register.html">Create one</a>
        </p>
      </section>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
